        <g><rect x="298" y="364" width="70" height="30" rx="15" fill="rgba(236,72,153,0.15)" stroke="url(#accentGrad)" stroke-width="1"/><text x="333" y="384" text-anchor="middle">React</text></g>
        <g><rect x="376" y="364" width="90" height="30" rx="15" fill="rgba(236,72,153,0.15)" stroke="url(#accentGrad)" stroke-width="1"/><text x="421" y="384" text-anchor="middle">Bootstrap</text></g>
