      <g font-family="Consolas, monospace" font-size="11" fill="url(#asciiGrad)" filter="url(#softGlow)">
        <text x="55" y="70" opacity="0">      .:++++++++++++:.<animate attributeName="opacity" to="1" begin="0.2s" dur="0.25s" fill="freeze"/></text>
        <text x="55" y="86" opacity="0">   .+################+.<animate attributeName="opacity" to="1" begin="0.45s" dur="0.25s" fill="freeze"/></text>
